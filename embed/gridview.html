<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>HKU-PGSA Album</title>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,initial-scale=1.0,width=device-width"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link type="text/css" rel="stylesheet" href="/css/gridview.css">
</head>
<body>

<div class="content" style="text-align: center">
    <div style="margin-bottom: 25px">
        <h2>HKU-PGSA 港大研會</h2>
    </div>
    <div id="app">
        <div class="card mb-3" style="max-width: 800px; text-align: left" v-for="content in contents">
            <div class="card-body">
                <h5 class="card-title">{{content.title}}</h5>
                <p class="card-text">{{content.description}}</p>
                <p class="card-text">
                    <small class="text-muted">Published on: {{content.time}}</small>
                </p>
            </div>
            <div class="overflow">
                <ul class="video_list">
                    <li v-for="image in content.images">
                        <div @click="openImg('/img/' + image)"><img v-bind:src="'/img/' + image" alt=""
                                                                      style="cursor: pointer;"/></div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
<script src="https://unpkg.com/vue-router/dist/vue-router.js"></script>
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>

<script>
    var formData = new URL(window.location.href).searchParams.get("data");
    var decodedData = decodeURIComponent(formData);
    var jsonObject = JSON.parse(decodedData);
    var app = new Vue({
        el: '#app',
        data: jsonObject,
        methods: {
            openImg: function (e) {
                window.open(e);
            }
        }
    })
</script>
</body>
</html>
